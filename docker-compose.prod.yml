services:

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: runtime
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL}
      FERNET_KEY: ${FERNET_KEY}
      APP_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    command: ["/app/scripts/start.sh"]
    networks:
      - default
      - coolify
    healthcheck:
      test: ["CMD", "/app/scripts/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - traefik.enable=true
      # Route all /api/* to backend (covers HTTP API + WebSocket /api/v1/ws/*)
      - traefik.http.routers.agentflow-api.rule=Host(`agentflow.basivo.in`) && PathPrefix(`/api`)
      - traefik.http.routers.agentflow-api.entrypoints=https
      - traefik.http.routers.agentflow-api.tls=true
      - traefik.http.routers.agentflow-api.tls.certresolver=letsencrypt
      - traefik.http.services.agentflow-api.loadbalancer.server.port=8000
      # Higher priority so it wins over the catch-all frontend route
      - traefik.http.routers.agentflow-api.priority=10

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
    networks:
      - default
      - coolify
    labels:
      - traefik.enable=true
      # Catch-all — everything that isn't /api goes to the frontend
      - traefik.http.routers.agentflow.rule=Host(`agentflow.basivo.in`)
      - traefik.http.routers.agentflow.entrypoints=https
      - traefik.http.routers.agentflow.tls=true
      - traefik.http.routers.agentflow.tls.certresolver=letsencrypt
      - traefik.http.services.agentflow.loadbalancer.server.port=3000
      - traefik.http.routers.agentflow.priority=1
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  default:
  coolify:
    external: true
