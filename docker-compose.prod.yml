services:

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: runtime
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL}
      FERNET_KEY: ${FERNET_KEY}
      APP_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    command: ["/app/scripts/start.sh"]
    networks:
      - default
      - coolify
    healthcheck:
      test: ["CMD", "/app/scripts/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    labels:
      - traefik.enable=true
      - traefik.http.routers.agentflow-api.rule=Host(`${DOMAIN}`) && PathPrefix(`/api`)
      - traefik.http.routers.agentflow-api.entrypoints=https
      - traefik.http.services.agentflow-api.loadbalancer.server.port=8000
      - traefik.http.routers.agentflow-api.priority=10

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner
    restart: always
    depends_on:
      backend:
        condition: service_started
    environment:
      NODE_ENV: production
    networks:
      - default
      - coolify
    labels:
      - traefik.enable=true
      - traefik.http.routers.agentflow.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.agentflow.entrypoints=https
      - traefik.http.services.agentflow.loadbalancer.server.port=3000
      - traefik.http.routers.agentflow.priority=1
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/',r=>{process.exit(r.statusCode<500?0:1)}).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

networks:
  default:
  coolify:
    external: true
